<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#0c2233"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2aa7d8"/>
    </marker>
    <marker id="arrowW" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#eaf6fb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="48" fill="#eaf6fb" font-size="30" font-weight="700">Moolathara command area  schematic</text>
  <text x="40" y="74" fill="#9fb3c8" font-size="16">Chittur taluk, Palakkad À west ÉÆ east À not to scale</text>

  <!-- North arrow -->
  <g transform="translate(1110,70)">
    <line x1="0" y1="34" x2="0" y2="0" stroke="#eaf6fb" stroke-width="2" marker-end="url(#arrowW)"/>
    <text x="-6" y="52" fill="#eaf6fb" font-size="14">N</text>
  </g>

  <!-- Kerala / Tamil Nadu border -->
  <line x1="1010" y1="100" x2="1010" y2="650" stroke="#c8a064" stroke-width="2.5" stroke-dasharray="9 7"/>
  <text x="1000" y="120" fill="#c8a064" font-size="15" text-anchor="end">KERALA</text>
  <text x="1020" y="120" fill="#c8a064" font-size="15">TAMIL NADU</text>

  <!-- TN source reservoirs -->
  <ellipse cx="1095" cy="210" rx="70" ry="40" fill="#15506f" stroke="#2aa7d8" stroke-width="2"/>
  <text x="1095" y="206" fill="#cdeaf6" font-size="13" text-anchor="middle">Aliyar /</text>
  <text x="1095" y="224" fill="#cdeaf6" font-size="13" text-anchor="middle">Parambikulam</text>
  <text x="1095" y="262" fill="#7fb8d6" font-size="12" text-anchor="middle">(TN reservoirs)</text>

  <!-- Chitturpuzha into the regulator -->
  <path d="M1030,235 C 960,250 920,275 870,290" fill="none" stroke="#2aa7d8" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <text x="905" y="262" fill="#7fb8d6" font-size="13">Chitturpuzha</text>

  <!-- Moolathara Regulator -->
  <g transform="translate(840,300)">
    <rect x="-18" y="-26" width="36" height="52" rx="4" fill="#1577a6" stroke="#eaf6fb" stroke-width="2"/>
    <text x="0" y="-36" fill="#eaf6fb" font-size="15" font-weight="700" text-anchor="middle">Moolathara</text>
    <text x="0" y="46" fill="#eaf6fb" font-size="14" text-anchor="middle">Regulator</text>
  </g>

  <!-- Left Bank Canal (existing) -->
  <path d="M838,278 C 760,210 700,180 600,165" fill="none" stroke="#5b8fb0" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 0" opacity="0.8" marker-end="url(#arrow)"/>
  <text x="600" y="150" fill="#9fb3c8" font-size="14" text-anchor="end">Left Bank Canal (existing)</text>

  <!-- Right Bank Canal extension (the new KIIFB project), flowing west -->
  <path d="M822,316 C 700,360 560,380 430,430 C 330,468 250,520 170,560"
        fill="none" stroke="#2aa7d8" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="150" y="588" fill="#cdeaf6" font-size="14">Æ Velanthavalam</text>

  <!-- Phase labels along RBC -->
  <text x="660" y="345" fill="#4caf50" font-size="14" font-weight="600">Phase I: KorayarÆVarattayar À 3,575 ha</text>
  <text x="300" y="498" fill="#4caf50" font-size="14" font-weight="600">Phase II: ÆVelanthavalam À 10,000+ ha</text>

  <!-- Zone stations -->
  <g font-size="13" fill="#0d1b2a">
    <circle cx="690" cy="368" r="16" fill="#2aa7d8" stroke="#eaf6fb" stroke-width="2"/>
    <text x="690" y="373" text-anchor="middle" font-weight="700">I</text>
    <circle cx="470" cy="430" r="16" fill="#2aa7d8" stroke="#eaf6fb" stroke-width="2"/>
    <text x="470" y="435" text-anchor="middle" font-weight="700">II</text>
    <circle cx="300" cy="498" r="16" fill="#2aa7d8" stroke="#eaf6fb" stroke-width="2"/>
    <text x="300" y="503" text-anchor="middle" font-weight="700">III</text>
  </g>
  <text x="712" y="372" fill="#9fb3c8" font-size="12">Zone-I tender</text>
  <text x="492" y="434" fill="#9fb3c8" font-size="12">Zone-II tender</text>
  <text x="322" y="502" fill="#9fb3c8" font-size="12">Zone-III tender</text>

  <!-- Command-area panchayat blocks -->
  <g>
    <rect x="700" y="430" width="230" height="120" rx="12" fill="#1b3a24" stroke="#4caf50" stroke-width="2"/>
    <text x="715" y="458" fill="#bfe6c5" font-size="17" font-weight="700">Eruthempathy</text>
    <text x="715" y="480" fill="#8fb89a" font-size="13">(our pilot panchayat)</text>

    <rect x="450" y="510" width="220" height="110" rx="12" fill="#16331f" stroke="#3c8f42" stroke-width="2"/>
    <text x="465" y="538" fill="#bfe6c5" font-size="17" font-weight="700">Vadakarapathy</text>

    <rect x="190" y="585" width="230" height="95" rx="12" fill="#142d1b" stroke="#357a3a" stroke-width="2"/>
    <text x="205" y="613" fill="#bfe6c5" font-size="17" font-weight="700">Kozhinjampara</text>
  </g>

  <!-- 15-acre pilot star in Eruthempathy, near the border / PWD road -->
  <g transform="translate(905,505)">
    <path d="M0,-22 L6,-7 L22,-7 L9,3 L14,19 L0,9 L-14,19 L-9,3 L-22,-7 L-6,-7 Z"
          fill="#ffd24a" stroke="#0d1b2a" stroke-width="1"/>
  </g>
  <text x="930" y="500" fill="#ffd24a" font-size="14" font-weight="700">15-acre pilot</text>
  <text x="930" y="519" fill="#d8c98f" font-size="12">PWD road À ~2 km from TN border</text>

  <!-- Legend -->
  <g transform="translate(40,632)" font-size="13">
    <rect x="0" y="-14" width="640" height="52" rx="8" fill="#0b1622" stroke="#1c3346"/>
    <line x1="16" y1="2" x2="46" y2="2" stroke="#2aa7d8" stroke-width="10" stroke-linecap="round"/>
    <text x="54" y="6" fill="#cdeaf6">RBC extension (KIIFB ~╣262 cr)</text>
    <line x1="300" y1="2" x2="330" y2="2" stroke="#5b8fb0" stroke-width="6" stroke-linecap="round"/>
    <text x="338" y="6" fill="#cdeaf6">existing canal</text>
    <circle cx="455" cy="2" r="9" fill="#2aa7d8" stroke="#eaf6fb"/>
    <text x="470" y="6" fill="#cdeaf6">tendered zone</text>
    <path d="M585,-8 L589,-1 L597,-1 L591,4 L593,12 L585,7 L577,12 L579,4 L573,-1 L581,-1 Z" fill="#ffd24a"/>
    <text x="600" y="6" fill="#cdeaf6">pilot</text>
    <text x="16" y="28" fill="#7f93a8" font-size="11">Schematic only  geometry illustrative, not survey-accurate. Source: KIIDC / KIIFB project notices.</text>
  </g>
</svg>
